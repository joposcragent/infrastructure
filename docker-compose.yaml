
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ensure-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        export PGPASSWORD="$$POSTGRES_PASSWORD"
        export PGHOST=postgres
        export PGPORT=5432
        until psql -U "$$POSTGRES_USER" -d postgres -c '\q' 2>/dev/null; do sleep 1; done
        EXISTS=$$(psql -U "$$POSTGRES_USER" -d postgres -Atqc "SELECT 1 FROM pg_database WHERE datname = '$$POSTGRES_DB'")
        if [ -z "$$EXISTS" ]; then
          psql -U "$$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$$POSTGRES_DB\""
        fi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  flyway:
    image: joposcragent-flyway:latest
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-joposcragent}
      FLYWAY_USER: ${POSTGRES_USER:-postgres}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      ensure-db:
        condition: service_completed_successfully
    restart: "no"

  sentence-transformer:
    image: joposcragent-sentence-transformer
    pull_policy: never
    ports:
      - "${SENTENCE_TRANSFORMER_PORT:-8000}:8000"
    environment:
      ST_HOST: ${ST_HOST:-0.0.0.0}
      ST_PORT: ${ST_PORT:-8000}
      ST_DEVICE: ${ST_DEVICE:-cpu}
    volumes:
      - sentence-transformer_data:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/sentence-transformer/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 50s

  settings-manager:
    image: joposcragent-settings-manager:${SETTINGS_MANAGER_IMAGE_TAG:-0.0.2-SNAPSHOT}
    pull_policy: never
    ports:
      - "${SETTINGS_MANAGER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SETTINGS_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      sentence-transformer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 40s

  job-postings-crud:
    image: joposcragent-job-postings-crud:${SETTINGS_MANAGER_IMAGE_TAG:-0.0.2-SNAPSHOT}
    pull_policy: never
    ports:
      - "${JOB_POSTINGS_CRUD_PORT:-8081}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  job-postings-evaluator:
    image: joposcragent-job-postings-evaluator:${JOB_POSTINGS_EVALUATOR_IMAGE_TAG:-0.0.1-SNAPSHOT}
    pull_policy: never
    ports:
      - "${JOB_POSTINGS_EVALUATOR_PORT:-8082}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JOPOSCRAGENT_SETTINGS_MANAGER_BASE_URL: http://settings-manager:8080
      JOPOSCRAGENT_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      settings-manager:
        condition: service_healthy
      sentence-transformer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres
  sentence-transformer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/sentence-transformer
