services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    ports:
       - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ensure-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        export PGPASSWORD="$$POSTGRES_PASSWORD"
        export PGHOST=postgres
        export PGPORT=5432
        until psql -U "$$POSTGRES_USER" -d postgres -c '\q' 2>/dev/null; do sleep 1; done
        EXISTS=$$(psql -U "$$POSTGRES_USER" -d postgres -Atqc "SELECT 1 FROM pg_database WHERE datname = '$$POSTGRES_DB'")
        if [ -z "$$EXISTS" ]; then
          psql -U "$$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$$POSTGRES_DB\""
        fi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  flyway:
    image: joposcragent/flyway:${FLYWAY_IMAGE_TAG:-latest}
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-joposcragent}
      FLYWAY_USER: ${POSTGRES_USER:-postgres}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      ensure-db:
        condition: service_completed_successfully
    restart: "no"

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    depends_on:
      kafka:
        condition: service_started

  sentence-transformer:
    image: joposcragent/sentence-transformer:${SENTENCE_TRANSFORMER_IMAGE_TAG:-latest}
    #ports:
    #  - "${SENTENCE_TRANSFORMER_PORT:-8000}:8000"
    environment:
      ST_HOST: ${ST_HOST:-0.0.0.0}
      ST_PORT: ${ST_PORT:-8000}
      ST_DEVICE: ${ST_DEVICE:-cpu}
    volumes:
      - sentence-transformer_data:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/sentence-transformer/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 50s

  settings-manager:
    image: joposcragent/settings-manager:${SETTINGS_IMAGE_TAG:-latest}
    #ports:
    #  - "${SETTINGS_MANAGER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SETTINGS_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      sentence-transformer:
        condition: service_healthy

  job-postings-crud:
    image: joposcragent/job-postings-crud:${CRUD_IMAGE_TAG:-latest}
    #ports:
    #  - "${JOB_POSTINGS_CRUD_PORT:-8081}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  job-postings-evaluator:
    image: joposcragent/job-postings-evaluator:${EVALUATOR_IMAGE_TAG:-latest}
    #ports:
    #  - "${JOB_POSTINGS_EVALUATOR_PORT:-8082}:8080"
    environment:
      # JSON console logs: uncomment to enable profile json-log (see application.yml in job-postings-evaluator).
      # SPRING_PROFILES_ACTIVE: json-log
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JOPOSCRAGENT_SETTINGS_MANAGER_BASE_URL: http://settings-manager:8080
      JOPOSCRAGENT_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      settings-manager:
        condition: service_started
      sentence-transformer:
        condition: service_started

  crawler-headhunter:
    image: joposcragent/crawler-headhunter:${CRAWLER_HEADHUNTER_IMAGE_TAG:-latest}
    #ports:
    #  - "${CRAWLER_HEADHUNTER_PORT:-3000}:3000"
    environment:
      JOB_POSTINGS_CRUD_URL: http://job-postings-crud:8080
    depends_on:
      job-postings-crud:
        condition: service_started

  orchestration-async-jobs-crud:
    image: joposcragent/orchestration-async-jobs-crud:${ORCHESTRATION_ASYNC_JOBS_CRUD_IMAGE_TAG:-latest}
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    #ports:
    #  - "${ORCHESTRATION_ASYNC_JOBS_CRUD_PORT:-8085}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  orchestration-scheduler:
    image: joposcragent/orchestration-scheduler:${ORCHESTRATION_SCHEDULER_IMAGE_TAG:-latest}
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    #ports:
    #  - "${ORCHESTRATION_SCHEDULER_PORT:-8083}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  orchestration-conductor:
    image: joposcragent/orchestration-conductor:${ORCHESTRATION_CONDUCTOR_IMAGE_TAG:-latest}
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JOPOSCRAGENT_SETTINGS_MANAGER_BASE_URL: http://settings-manager:8080
    #ports:
    #  - "${ORCHESTRATION_CONDUCTOR_PORT:-8084}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      settings-manager:
        condition: service_started

  # SPA: VITE_* вшиваются при сборке образа, не из environment контейнера.
  # Пустые API URL + nginx: same-origin; прокси на settings-manager и job-postings-crud.
  web-front:
    image: joposcragent/web-front:${WEB_FRONT_IMAGE_TAG:-latest}
    ports:
      - "${WEB_FRONT_PORT:-80}:80"
    depends_on:
      settings-manager:
        condition: service_started
      job-postings-crud:
        condition: service_started
      job-postings-evaluator:
        condition: service_started

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres
  sentence-transformer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/sentence-transformer
  kafka_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/kafka
