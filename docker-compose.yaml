# Общий env: при переопределении `environment` в сервисе с `<<: *` без merge
# часть движков затирает весь блок из якоря — воркер/flower копируют его через `<<: *` ниже.
x-celery-orchestrator-env: &celery_orchestrator_env
  PYTHONPATH: /app/src
  REDIS_URL: redis://redis:6379/0
  SETTINGS_MANAGER_BASE_URL: http://settings-manager:8080
  CRAWLER_BASE_URL: http://crawler-headhunter:3000
  EVALUATOR_BASE_URL: http://job-postings-evaluator:8080

x-celery-orchestrator-base: &celery_orchestrator_base
  image: joposcragent/celery-orchestrator:${CELERY_ORCHESTRATOR_IMAGE_TAG:-latest}
  pull_policy: never
  working_dir: /app
  environment: *celery_orchestrator_env
  depends_on:
    redis:
      condition: service_healthy
    settings-manager:
      condition: service_started
    crawler-headhunter:
      condition: service_started
    job-postings-evaluator:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ensure-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-joposcragent}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        export PGPASSWORD="$$POSTGRES_PASSWORD"
        export PGHOST=postgres
        export PGPORT=5432
        until psql -U "$$POSTGRES_USER" -d postgres -c '\q' 2>/dev/null; do sleep 1; done
        EXISTS=$$(psql -U "$$POSTGRES_USER" -d postgres -Atqc "SELECT 1 FROM pg_database WHERE datname = '$$POSTGRES_DB'")
        if [ -z "$$EXISTS" ]; then
          psql -U "$$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"$$POSTGRES_DB\""
        fi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  flyway:
    image: joposcragent/flyway:${FLYWAY_IMAGE_TAG:-latest}
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-joposcragent}
      FLYWAY_USER: ${POSTGRES_USER:-postgres}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      ensure-db:
        condition: service_completed_successfully
    restart: "no"

  sentence-transformer:
    image: joposcragent-sentence-transformer
    pull_policy: never
    ports:
      - "${SENTENCE_TRANSFORMER_PORT:-8000}:8000"
    environment:
      ST_HOST: ${ST_HOST:-0.0.0.0}
      ST_PORT: ${ST_PORT:-8000}
      ST_DEVICE: ${ST_DEVICE:-cpu}
    volumes:
      - sentence-transformer_data:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/sentence-transformer/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 50s

  settings-manager:
    image: joposcragent/settings-manager:${SETTINGS_IMAGE_TAG:-latest}
    pull_policy: never
    ports:
      - "${SETTINGS_MANAGER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SETTINGS_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      sentence-transformer:
        condition: service_healthy

  job-postings-crud:
    image: joposcragent/job-postings-crud:${CRUD_IMAGE_TAG:-latest}
    pull_policy: never
    ports:
      - "${JOB_POSTINGS_CRUD_PORT:-8081}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

  job-postings-evaluator:
    image: joposcragent/job-postings-evaluator:${EVALUATOR_IMAGE_TAG:-latest}
    pull_policy: never
    ports:
      - "${JOB_POSTINGS_EVALUATOR_PORT:-8082}:8080"
    environment:
      # JSON console logs: uncomment to enable profile json-log (see application.yml in job-postings-evaluator).
      # SPRING_PROFILES_ACTIVE: json-log
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/joposcragent
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JOPOSCRAGENT_SETTINGS_MANAGER_BASE_URL: http://settings-manager:8080
      JOPOSCRAGENT_SENTENCE_TRANSFORMER_BASE_URL: http://sentence-transformer:8000/sentence-transformer
      CELERY_ORCHESTRATOR_BASE_URL: http://celery-orchestrator-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      settings-manager:
        condition: service_started
      sentence-transformer:
        condition: service_started
  crawler-headhunter:
    image: joposcragent/crawler-headhunter:${CRAWLER_HEADHUNTER_IMAGE_TAG:-latest}
    pull_policy: never
    ports:
      - "${CRAWLER_HEADHUNTER_PORT:-3000}:3000"
    environment:
      JOB_POSTINGS_CRUD_URL: http://job-postings-crud:8080
      CELERY_ORCHESTRATOR_BASE_URL: http://celery-orchestrator-api:8000
    depends_on:
      job-postings-crud:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery-orchestrator-api:
    <<: *celery_orchestrator_base
    entrypoint: ["python", "-m", "uvicorn"]
    command:
      - celery_orchestrator.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    ports:
      - "${CELERY_ORCHESTRATOR_HTTP_PORT:-8001}:8000"

  celery-orchestrator-worker:
    <<: *celery_orchestrator_base
    entrypoint: ["python", "-m", "celery"]
    environment:
      <<: *celery_orchestrator_env
      CELERY_ORCHESTRATOR_FINISH_WAIT_TIMEOUT_SECONDS: 300
    command:
      - -A
      - celery_orchestrator.celery_app
      - worker
      - --loglevel
      - "${CELERY_ORCHESTRATOR_LOG_LEVEL:-info}"
      - --concurrency
      - "6"

  celery-orchestrator-flower:
    <<: *celery_orchestrator_base
    entrypoint: ["python", "-m", "celery"]
    command:
      - -A
      - celery_orchestrator.celery_app
      - flower
      - --port=5555
    ports:
      - "${CELERY_ORCHESTRATOR_FLOWER_PORT:-5555}:5555"

  celery-orchestrator-beat:
    <<: *celery_orchestrator_base
    entrypoint: ["python", "-m", "celery"]
    command:
      - -A
      - celery_orchestrator.celery_app
      - beat
      - --loglevel
      - "${CELERY_ORCHESTRATOR_LOG_LEVEL:-info}"

volumes:
  postgres_data:    
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres
  sentence-transformer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/sentence-transformer
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/redis
